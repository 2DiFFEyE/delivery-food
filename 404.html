<!-- Кнопка "Наверх" -->
<button id="scrollTop" style="position: fixed; bottom: 30px; right: 30px; background: #1890FF; color: white; border: none; border-radius: 50%; width: 50px; height: 50px; font-size: 24px; cursor: pointer; opacity: 0; visibility: hidden; transform: translateY(20px); transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s; box-shadow: 0 4px 12px rgba(24, 144, 255, 0.4); z-index: 999;">
    ↑
</button>

<script>
    const scrollBtn = document.getElementById('scrollTop');

    window.addEventListener('scroll', () => {
        // Показываем кнопку, когда прокрутили больше 500px
        if (window.scrollY > 500) {
            scrollBtn.style.opacity = '1';
            scrollBtn.style.visibility = 'visible';
            scrollBtn.style.transform = 'translateY(0)';
        } else {
            scrollBtn.style.opacity = '0';
            scrollBtn.style.visibility = 'hidden';
            scrollBtn.style.transform = 'translateY(20px)';
        }
    });

    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
</script>
